<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Redirect Engine - API Docs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #fafafa; }
        .swagger-ui .topbar { display: none; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
        // Read token from parent URL or own query string
        var token = new URLSearchParams(window.location.search).get('token') || '';
        if (!token && window.parent !== window) {
            try {
                token = new URLSearchParams(window.parent.location.search).get('token') ||
                        window.parent.sessionStorage.getItem('redirect_token') || '';
            } catch(e) {}
        }

        SwaggerUIBundle({
            url: '/ui/openapi.json',
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
            plugins: [SwaggerUIBundle.plugins.DownloadUrl],
            layout: 'StandaloneLayout',
            defaultModelsExpandDepth: 1,
            defaultModelExpandDepth: 1,
            docExpansion: 'list',
            filter: true,
            requestInterceptor: function(req) {
                if (req.url && token) {
                    var sep = req.url.includes('?') ? '&' : '?';
                    req.url = req.url + sep + 'token=' + token;
                }
                return req;
            }
        });
    </script>
</body>
</html>
